services:

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: "no"                          # smc-trader controls start/stop
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      JAVA_HEAP_SIZE: 512
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: no
    ports:
      - "4004:4004"
      - "4003:4003"
    volumes:
      - ib-gateway-settings:/home/ibgateway

  smc-trader:
    build: .
    restart: unless-stopped
    environment:
      IBKR_HOST: ib-gateway
      IBKR_PORT: ${IBKR_PORT:-4004}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-1}
      ACCOUNT_SIZE: ${ACCOUNT_SIZE:-10000}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      USE_FULL_SP500: ${USE_FULL_SP500:-false}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-snapback}
    volumes:
      - trader-data:/app/data
      - trader-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # to start/stop ib-gateway

volumes:
  ib-gateway-settings:
  trader-data:
  trader-logs:
